<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOYCE'26 — Event Concluded</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    background: #0A0F1C;
    color: #FFF;
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  
  /* Cyberpunk background styling */
  .scan {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
  }

  .container {
    text-align: center;
    padding: 50px 30px;
    background: rgba(0, 240, 255, 0.03);
    border: 1px solid rgba(0, 240, 255, 0.15);
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0, 240, 255, 0.05);
    max-width: 600px;
    width: 90%;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(10px);
  }

  /* Neon top border */
  .container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #00F0FF, transparent);
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    color: #00F0FF;
    text-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
    margin: 0 0 5px 0;
    letter-spacing: 4px;
  }

  h2 {
    font-family: 'Orbitron', sans-serif;
    color: rgba(255, 255, 255, 0.7);
    font-size: clamp(1rem, 3vw, 1.4rem);
    letter-spacing: 3px;
    margin-bottom: 25px;
    text-transform: uppercase;
  }

  p {
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.8;
    font-size: 0.95rem;
    margin-bottom: 35px;
  }

  .icon {
    font-size: 4.5rem;
    margin-bottom: 15px;
    animation: float 3.5s ease-in-out infinite;
  }

  .badge {
    display: inline-block;
    background: rgba(0, 240, 255, 0.08);
    border: 1px solid rgba(0, 240, 255, 0.3);
    color: #00F0FF;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 10px 24px;
    border-radius: 50px;
    text-transform: uppercase;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }
</style>
</head>
<body>
  <div class="scan"></div>
  <div class="container">
    <div class="icon">🚀</div>
    <h1>VOYCE'26</h1>
    <h2>SYMPOSIUM CONCLUDED</h2>
    <p>Thank you to all the brilliant minds, coordinators, and participants who made this national-level technical symposium a massive success. Registrations and the game arena are now permanently closed.</p>
    <div class="badge">
      SEE YOU NEXT YEAR
    </div>
  </div>
</body>
</html>
